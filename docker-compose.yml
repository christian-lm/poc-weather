services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: weatherdb
      POSTGRES_USER: weather
      POSTGRES_PASSWORD: weather123
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - tsdb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weather -d weatherdb"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: weatherdb
      DB_USER: weather
      DB_PASSWORD: weather123
      SPRING_PROFILES_ACTIVE: json-logs
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      timescaledb:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "${UI_PORT:-3000}:3000"
    depends_on:
      - backend

volumes:
  tsdb_data:
